services:
  postres:
    image: postgres:16-alpine
    container_name: shop-postgres
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: shop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD" , "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpanda/redpanda:v24:2.7
    container_name: shop-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisoned
      - --node-id=0
      - --check=false
      - -kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0/9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "29092:29092"
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: redpandata/console:v2.7.2
    container_name: shop-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"


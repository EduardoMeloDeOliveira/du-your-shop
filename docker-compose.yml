

services:

  redpanda:
    image: redpanda/redpanda:v24.1.7
    container_name: shop-redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:29092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:29092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL" , "rpk cluster health | grep -q 'Healthy:.true*'"]
      interval: 10s
      timeout: 5s
      retries: 10


  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: shop-redpanda-console
    depends_on: ["redpanda"]
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: "redpanda:29092"



  postgres:
    image: postgres:16-alpine
    container_name: shop-postgres
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shop-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10



